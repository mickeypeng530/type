<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>VoiceReport 🩻</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1a212b; --panel2:#222b38; --line:#2e3a4a;
    --text:#e6edf3; --muted:#8b97a7; --accent:#4da3ff; --rec:#ff4d5e; --ok:#3fd17a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;}
  body{max-width:760px; margin:0 auto; padding:16px 14px 60px;}
  h1{font-size:18px; margin:4px 0 14px; font-weight:600;}
  h1 small{color:var(--muted); font-weight:400; font-size:13px;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:14px; margin-bottom:14px;}
  label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px;}
  input[type=password],input[type=text],textarea,select{
    width:100%; background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:10px; padding:11px 12px; font-size:16px; outline:none;}
  textarea{resize:vertical; min-height:230px; line-height:1.45; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:14px; white-space:pre;}
  .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  button{border:none; border-radius:10px; padding:12px 16px; font-size:15px; font-weight:600;
    color:#fff; background:var(--accent); cursor:pointer;}
  button.ghost{background:var(--panel2); color:var(--text); border:1px solid var(--line);}
  button:active{transform:translateY(1px);}
  button:disabled{opacity:.45; cursor:default;}
  #recBtn{width:100%; padding:22px; font-size:18px; background:var(--accent);}
  #recBtn.recording{background:var(--rec); animation:pulse 1.1s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,77,94,.5)}70%{box-shadow:0 0 0 16px rgba(255,77,94,0)}100%{box-shadow:0 0 0 0 rgba(255,77,94,0)}}
  .status{font-size:13px; color:var(--muted); min-height:20px; margin-top:10px;}
  .status.err{color:var(--rec);} .status.ok{color:var(--ok);}
  .transcript{font-size:13px; color:var(--muted); background:var(--panel2);
    border-radius:10px; padding:10px 12px; margin-top:10px; word-break:break-word;}
  .transcript b{color:var(--accent);}
  .pill{display:inline-block; font-size:12px; color:var(--ok); background:rgba(63,209,122,.12);
    border:1px solid rgba(63,209,122,.35); border-radius:999px; padding:3px 10px; margin-top:8px;}
  details summary{cursor:pointer; color:var(--muted); font-size:13px;}
  .hint{font-size:12px; color:var(--muted); margin-top:8px; line-height:1.5;}
</style>
</head>
<body>

<h1>VoiceReport <small>口說打報告 · v1</small></h1>

<!-- ── Settings ── -->
<details class="card" id="cfgCard">
  <summary>⚙️ 設定(API key)</summary>
  <div style="margin-top:12px;">
    <label>OpenAI API Key(只存在本機瀏覽器 localStorage)</label>
    <input type="password" id="apiKey" placeholder="sk-...">
    <div class="row" style="margin-top:10px;">
      <button class="ghost" id="saveKey">儲存</button>
      <span class="status" id="keyStatus"></span>
    </div>
    <div class="hint">⚠️ 口述時勿念病歷號／姓名等個資。音訊與文字會送往 OpenAI 雲端。</div>
  </div>
</details>

<!-- ── Record ── -->
<div class="card">
  <button id="recBtn">🎙️ 按住說話（放開送出）</button>
  <div class="status" id="status">準備就緒</div>
  <div class="transcript" id="transcript" style="display:none;"></div>
  <div id="matched"></div>
</div>

<!-- ── Result ── -->
<div class="card">
  <label>報告結果（可直接編輯）</label>
  <textarea id="result" placeholder="結果會出現在這裡…"></textarea>
  <div class="row" style="margin-top:10px;">
    <button id="copyBtn">📋 複製</button>
    <button class="ghost" id="clearBtn">清空</button>
  </div>
</div>

<script>
/* ============================================================
   模板目錄  ——  之後可由 AHK 自動解析重生這一段(目前 6 個)
   每個模板:id / name / 描述(供模型挑選) / base(基底全文)
   ============================================================ */
const TEMPLATES = [
{
  id:"ct-brain-nc",
  name:"CT brain without contrast",
  desc:"non-contrast / plain CT of the brain (head CT). Keywords: CT brain, head CT, noncontrast, plain.",
  base:`CT of brain without contrast enhancement shows:
[Comparison with previous image] No
[Findings]
Brain:
- No intra or extra-axial mass lesions or collections are identified.
- The ventricles and sulci spaces are within normal limit.
- No loss of grey-white matter junction is seen.
- No midline shift is seen.
Ventricles: Unremarkable.
Orbit & sinuses:
- Paranasal sinuses intact.
- The orbits are unremarkable.
Bones & soft tissue:
- No bony fracture or abnormality is seen. Mastoid air cells normal.
Other remarkable findings: none.`
},
{
  id:"ct-chest-nc",
  name:"Chest Lung/Pleura CT without contrast",
  desc:"chest CT WITHOUT contrast (plain / non-enhanced). Lung, pleura, mediastinum.",
  base:`Chest Lung/Pleura CT without contrast shows:

[Comparison with previous image] No

[Findings]
- No definite lung lesion is identified.
- The heart size is within normal limit.
- No lymphadenopathy in the mediastinum nor bilateral hila.

- No definite organic lesion could be detected in the visible liver, spleen, pancreas, and kidneys.
- Normal size and shape of the adrenal glands.
- No lymphadenopathy in the abdomen.
- No osteolytic nor osteoblastic lesion in the visible bony structures.`
},
{
  id:"ct-chest-cwc",
  name:"Chest Lung/Pleura CT with/without contrast",
  desc:"chest CT WITH contrast (contrast-enhanced / with and without). Lung, pleura, mediastinum.",
  base:`Chest Lung/Pleura CT with/without contrast shows:

[Comparison with previous image] No

[Findings]
- No definite lung lesion is identified.
- The heart size is within normal limit.
- No lymphadenopathy in the mediastinum nor bilateral hila.

- No definite organic lesion could be detected in the visible liver, spleen, pancreas, and kidneys.
- Normal size and shape of the adrenal glands.
- No lymphadenopathy in the abdomen.
- No osteolytic nor osteoblastic lesion in the visible bony structures.`
},
{
  id:"ct-abdomen-cwc",
  name:"Abdominal CT with/without contrast",
  desc:"abdominal / abdomen CT with or without contrast. Liver, gallbladder, pancreas, spleen, kidneys, bowel, appendix.",
  base:`Abdominal CT with/without contrast shows:

[Comparison with previous image]No

[Findings]
- No abnormal hypodense lesion or enhancement of the liver parenchyma is identified.
- The gallbladder, pancreas, spleen, bilateral adrenal glands and kidneys are unremarkable.
- No definite abnormality of the bowel loops is appreciated.
- The appendix reveals normal in size.
- No definite lymphadenopathy can be identified in abdomen.

- No definite lung lesion can be identified in the visible lung fields.
- No abnormal soft tissue lesion.
- The bony structures are unremarkable.`
},
{
  id:"mri-brain-cwc",
  name:"Brain MRI with and without IV contrast",
  desc:"brain MRI / MR with and without IV gadolinium contrast. Includes pulse sequences, DWI/ADC, MRA.",
  base:`Brain MRI with and without IV contrast enhancement shows:

[Pulse sequences]
(1) Axial turbo spin echo (TSE) T1WI, Sag T1WI
(2) 3D TOF MR angiography (MRA)
(3) Gadolinium enhanced axial, cor, sag T1WIs, axial T2WIs and FLAIR T2WIs.
(4) Diffusion weighted imaging (DWI) with apparent diffusion coefficiency (ADC) map
(5) [3D SWI with phase images or axial gradient T2* weighted images]

[Comparison with previous image] No

[Image findings]
- Mild ventricular dilatation, widening of cortical sulci & both Sylvian fissures are noted, in favor of mild atrophic change of brain parenchyma.
- High-signal foci on T2WIs are noted in the periventricular white matter of bilateral cerebral hemispheres, in favor of small vessel arteriosclerotic brain change.

- No definite space-occupying lesion nor abnormal enhancement.
- No diffusion restriction lesion is identified in the DWI/ADC map.
- No evidence of intracranial hemorrhage or midline shift is noted.
- The cranial vault and skull base appear normal.
- Clear paranasal sinuses and bilateral mastoid air cells.
- Preserved retrobulbar fat planes and nasopharynx.
- Bilateral major intracranial arteries, bilateral proximal ICA, VA are patent on MRA images.`
},
{
  id:"ct-cap-cwc",
  name:"CT chest/abdomen/pelvis without/with IV contrast",
  desc:"CT of chest abdomen pelvis (CAP) without/with IV contrast. Whole-body trunk survey.",
  base:`CT scan of the chest, abdomen and pelvis without/with IV contrast enhancement shows:
[Comparison with previous image] No
[Findings]
- No definite lung lesion is identified.
- The heart size is within normal limit.
- No lymphadenopathy in the mediastinum nor bilateral hila.

- No abnormal hypodense lesion or enhancement of the liver parenchyma is identified.
- The gallbladder, pancreas, spleen, bilateral adrenal glands and kidneys are unremarkable.
- No definite abnormality of the bowel loops is appreciated.
- The appendix reveals normal in size.
- No definite lymphadenopathy can be identified in abdomen.
- The bony structures are unremarkable.`
}
];

/* Whisper 詞彙偏置(對治非母語口音 → 先把醫學詞聽對) */
const ASR_VOCAB = "Radiology report dictation. Vocabulary: CT, MRI, MRA, contrast, noncontrast, non-contrast, enhanced, brain, intracranial hemorrhage, midline shift, ventricles, sulci, grey-white matter junction, infarct, infarction, ischemia, edema, mass, lesion, nodule, atrophy, leukoaraiosis, FLAIR, DWI, ADC, paranasal sinuses, orbits, mastoid air cells, chest, lung, pleura, effusion, pneumonia, consolidation, nodule, mediastinum, hila, lymphadenopathy, heart, liver, spleen, pancreas, kidneys, adrenal glands, gallbladder, bowel, appendix, hepatic, splenic, renal, pelvis, fracture.";

/* 系統 prompt:選模板 + 依口述把 negative 翻 positive */
function buildSystemPrompt(){
  const catalog = TEMPLATES.map((t,i)=>
    `### Template ${i+1} — id:"${t.id}" — ${t.name}\n(${t.desc})\n"""\n${t.base}\n"""`
  ).join("\n\n");
  return `You are a radiology report assistant for a non-native English speaker. The dictation may be mis-transcribed; map approximate words to the correct standard radiology term (e.g. hemorrhage, infarct, lymphadenopathy, effusion).

Workflow:
1. Pick the ONE template below that best matches the dictated study (modality + body region + contrast). If contrast is unstated, prefer the "without contrast" variant; pick the "with"/"with/without" variant only when contrast/enhanced is mentioned.
2. Start from that template's base text EXACTLY.
3. The base text is an all-normal study. For each ABNORMAL finding the radiologist dictated:
   - If a matching normal/negative line exists, REWRITE that line into the positive finding using proper radiology phrasing.
   - Otherwise ADD a concise finding line in the correct section.
   - Leave every other normal line unchanged, in the original order.
4. If a comparison date/prior study is mentioned, fill the [Comparison with previous image] field; otherwise leave it as in the template.
5. Preserve the template's exact line structure, headings, spacing and bullet style.

Output a JSON object: {"templateId": "<id>", "report": "<the full final report text>"}. No extra commentary.

Templates:
${catalog}`;
}

/* ============================ 邏輯 ============================ */
const $=id=>document.getElementById(id);
const KEY_LS="vr_openai_key";

// API key 載入/儲存
$("apiKey").value = localStorage.getItem(KEY_LS) || "";
if(!$("apiKey").value){ $("cfgCard").open=true; }
$("saveKey").onclick=()=>{
  localStorage.setItem(KEY_LS, $("apiKey").value.trim());
  setKeyStatus("已儲存 ✓", "ok");
};
function setKeyStatus(m,c){ const e=$("keyStatus"); e.textContent=m; e.className="status "+(c||""); }
function getKey(){ return ($("apiKey").value || localStorage.getItem(KEY_LS) || "").trim(); }

function setStatus(m,c){ const e=$("status"); e.textContent=m; e.className="status "+(c||""); }

// 挑選錄音格式(iOS Safari 偏好 mp4,桌機偏好 webm)
function pickMime(){
  const c=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/aac"];
  for(const m of c){ if(window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m; }
  return "";
}

let mediaRecorder=null, chunks=[], stream=null, recMime="", pressTimer=null;

async function startRec(){
  if(!getKey()){ setStatus("請先到 ⚙️ 設定填入 API key","err"); $("cfgCard").open=true; return; }
  try{
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
  }catch(e){ setStatus("無法取得麥克風權限："+e.message,"err"); return; }
  recMime = pickMime();
  chunks=[];
  mediaRecorder = recMime ? new MediaRecorder(stream,{mimeType:recMime}) : new MediaRecorder(stream);
  mediaRecorder.ondataavailable=e=>{ if(e.data.size>0) chunks.push(e.data); };
  mediaRecorder.onstop=onStopped;
  mediaRecorder.start();
  $("recBtn").classList.add("recording");
  $("recBtn").textContent="🔴 錄音中…放開送出";
  setStatus("錄音中…");
}

function stopRec(){
  if(mediaRecorder && mediaRecorder.state!=="inactive") mediaRecorder.stop();
  $("recBtn").classList.remove("recording");
  $("recBtn").textContent="🎙️ 按住說話（放開送出）";
}

async function onStopped(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  const blob = new Blob(chunks, {type: recMime || "audio/webm"});
  if(blob.size < 1200){ setStatus("錄音太短，再試一次","err"); return; }
  try{
    setStatus("① 轉錄中（Whisper）…");
    const text = await transcribe(blob);
    showTranscript(text);
    if(!text || text.trim().length<2){ setStatus("沒聽到內容","err"); return; }
    setStatus("② 填模板中（gpt-4o-mini）…");
    const {templateId, report} = await fillTemplate(text);
    $("result").value = report;
    showMatched(templateId);
    setStatus("完成 ✓","ok");
  }catch(e){ setStatus("錯誤："+e.message,"err"); }
}

async function transcribe(blob){
  const ext = (recMime.includes("mp4")||recMime.includes("aac")) ? "m4a" : "webm";
  const fd=new FormData();
  fd.append("file", blob, "audio."+ext);
  fd.append("model","whisper-1");
  fd.append("language","en");
  fd.append("prompt", ASR_VOCAB);
  const r=await fetch("https://api.openai.com/v1/audio/transcriptions",{
    method:"POST", headers:{Authorization:"Bearer "+getKey()}, body:fd});
  if(!r.ok) throw new Error("Whisper "+r.status+" "+(await r.text()).slice(0,120));
  return (await r.json()).text;
}

async function fillTemplate(transcript){
  const r=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{Authorization:"Bearer "+getKey(),"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"gpt-4o-mini",
      temperature:0.2,
      response_format:{type:"json_object"},
      messages:[
        {role:"system",content:buildSystemPrompt()},
        {role:"user",content:"Dictation: "+transcript}
      ]
    })
  });
  if(!r.ok) throw new Error("Chat "+r.status+" "+(await r.text()).slice(0,120));
  const txt=(await r.json()).choices[0].message.content;
  let obj; try{ obj=JSON.parse(txt); }catch(_){ obj={templateId:"",report:txt}; }
  return obj;
}

function showTranscript(t){
  const e=$("transcript"); e.style.display="block";
  e.innerHTML="<b>聽到：</b>"+ (t||"").replace(/</g,"&lt;");
}
function showMatched(id){
  const t=TEMPLATES.find(x=>x.id===id);
  $("matched").innerHTML = t ? `<span class="pill">模板：${t.name}</span>` : "";
}

// 按住說話(支援滑鼠 + 觸控);也容錯成「點一下開始/再點停止」
const rb=$("recBtn");
let holdMode=false;
rb.addEventListener("pointerdown",e=>{ e.preventDefault(); holdMode=true; startRec(); });
rb.addEventListener("pointerup",e=>{ e.preventDefault(); if(holdMode){ holdMode=false; stopRec(); } });
rb.addEventListener("pointercancel",()=>{ if(holdMode){ holdMode=false; stopRec(); } });

$("copyBtn").onclick=async()=>{
  const v=$("result").value;
  try{ await navigator.clipboard.writeText(v); setStatus("已複製 ✓","ok"); }
  catch(_){ $("result").select(); document.execCommand("copy"); setStatus("已複製 ✓","ok"); }
};
$("clearBtn").onclick=()=>{ $("result").value=""; $("transcript").style.display="none"; $("matched").innerHTML=""; setStatus("準備就緒"); };
</script>
</body>
</html>
