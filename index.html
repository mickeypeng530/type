<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>VoiceReport 🩻</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1a212b; --panel2:#222b38; --line:#2e3a4a;
    --text:#e6edf3; --muted:#8b97a7; --accent:#4da3ff; --ok:#3fd17a; --err:#ff4d5e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;}
  body{max-width:760px; margin:0 auto; padding:16px 14px 60px;}
  h1{font-size:18px; margin:4px 0 14px; font-weight:600;}
  h1 small{color:var(--muted); font-weight:400; font-size:13px;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:14px;}
  label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px;}
  input[type=password],textarea{width:100%; background:var(--panel2); color:var(--text);
    border:1px solid var(--line); border-radius:10px; padding:11px 12px; font-size:16px; outline:none;}
  #dictation{min-height:90px; line-height:1.5; resize:vertical;}
  #result{min-height:240px; line-height:1.45; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:14px; white-space:pre; resize:vertical;}
  .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  button{border:none; border-radius:10px; padding:12px 16px; font-size:15px; font-weight:600; color:#fff; background:var(--accent); cursor:pointer;}
  button.ghost{background:var(--panel2); color:var(--text); border:1px solid var(--line);}
  button:active{transform:translateY(1px);}
  #goBtn{width:100%; padding:18px; font-size:17px; margin-top:10px;}
  .status{font-size:13px; color:var(--muted); min-height:20px; margin-top:10px;}
  .status.err{color:var(--err);} .status.ok{color:var(--ok);}
  .pill{display:inline-block; font-size:12px; color:var(--ok); background:rgba(63,209,122,.12);
    border:1px solid rgba(63,209,122,.35); border-radius:999px; padding:3px 10px; margin-top:8px;}
  details summary{cursor:pointer; color:var(--muted); font-size:13px;}
  .hint{font-size:12px; color:var(--muted); margin-top:8px; line-height:1.5;}
  .seg{display:flex; border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-bottom:12px;}
  .seg button{flex:1; border-radius:0; background:var(--panel2); color:var(--muted); font-size:14px; padding:11px;}
  .seg button.on{background:var(--accent); color:#fff;}
</style>
</head>
<body>

<h1>VoiceReport <small>口說打報告 · v2</small></h1>

<div class="seg" id="modeSeg">
  <button data-mode="free">🆓 免費（選模板）</button>
  <button data-mode="api">🧠 智慧（自動填寫）</button>
</div>

<details class="card" id="cfgCard">
  <summary>⚙️ 設定（OpenAI API key，僅智慧模式需要）</summary>
  <div style="margin-top:12px;">
    <label>OpenAI API Key（只存在本機瀏覽器 localStorage）</label>
    <input type="password" id="apiKey" placeholder="sk-...">
    <div class="row" style="margin-top:10px;">
      <button class="ghost" id="saveKey">儲存</button>
      <span class="status" id="keyStatus"></span>
    </div>
    <div class="hint">⚠️ 口述時勿念病歷號／姓名等個資。文字會送往 OpenAI 雲端。</div>
  </div>
</details>

<!-- ① 口述 -->
<div class="card">
  <label>① 口述內容（點下方框 → 按鍵盤上的 🎤 說話，或直接打字）</label>
  <textarea id="dictation" placeholder="例：CT noncontrast brain, acute hemorrhage at right basal ganglia"></textarea>
  <button id="goBtn">🔍 產生報告</button>
  <div class="status" id="status">準備就緒</div>
  <div id="matched"></div>
</div>

<!-- ② 結果 -->
<div class="card">
  <label>② 報告結果（可直接編輯）</label>
  <textarea id="result" placeholder="結果會出現在這裡…"></textarea>
  <div class="row" style="margin-top:10px;">
    <button id="copyBtn">📋 複製</button>
    <button class="ghost" id="clearBtn">清空</button>
  </div>
</div>

<script>
/* ============================================================
   模板目錄 — 之後可由 AHK 自動解析重生(目前 6 個)
   ============================================================ */
const TEMPLATES = [
{ id:"ct-brain-nc", name:"CT brain without contrast",
  desc:"non-contrast / plain CT of the brain (head CT).",
  base:`CT of brain without contrast enhancement shows:
[Comparison with previous image] No
[Findings]
Brain:
- No intra or extra-axial mass lesions or collections are identified.
- The ventricles and sulci spaces are within normal limit.
- No loss of grey-white matter junction is seen.
- No midline shift is seen.
Ventricles: Unremarkable.
Orbit & sinuses:
- Paranasal sinuses intact.
- The orbits are unremarkable.
Bones & soft tissue:
- No bony fracture or abnormality is seen. Mastoid air cells normal.
Other remarkable findings: none.` },

{ id:"ct-chest-nc", name:"Chest Lung/Pleura CT without contrast",
  desc:"chest CT WITHOUT contrast (plain). Lung, pleura, mediastinum.",
  base:`Chest Lung/Pleura CT without contrast shows:

[Comparison with previous image] No

[Findings]
- No definite lung lesion is identified.
- The heart size is within normal limit.
- No lymphadenopathy in the mediastinum nor bilateral hila.

- No definite organic lesion could be detected in the visible liver, spleen, pancreas, and kidneys.
- Normal size and shape of the adrenal glands.
- No lymphadenopathy in the abdomen.
- No osteolytic nor osteoblastic lesion in the visible bony structures.` },

{ id:"ct-chest-cwc", name:"Chest Lung/Pleura CT with/without contrast",
  desc:"chest CT WITH contrast (contrast-enhanced). Lung, pleura, mediastinum.",
  base:`Chest Lung/Pleura CT with/without contrast shows:

[Comparison with previous image] No

[Findings]
- No definite lung lesion is identified.
- The heart size is within normal limit.
- No lymphadenopathy in the mediastinum nor bilateral hila.

- No definite organic lesion could be detected in the visible liver, spleen, pancreas, and kidneys.
- Normal size and shape of the adrenal glands.
- No lymphadenopathy in the abdomen.
- No osteolytic nor osteoblastic lesion in the visible bony structures.` },

{ id:"ct-abdomen-cwc", name:"Abdominal CT with/without contrast",
  desc:"abdominal CT. Liver, gallbladder, pancreas, spleen, kidneys, bowel, appendix.",
  base:`Abdominal CT with/without contrast shows:

[Comparison with previous image]No

[Findings]
- No abnormal hypodense lesion or enhancement of the liver parenchyma is identified.
- The gallbladder, pancreas, spleen, bilateral adrenal glands and kidneys are unremarkable.
- No definite abnormality of the bowel loops is appreciated.
- The appendix reveals normal in size.
- No definite lymphadenopathy can be identified in abdomen.

- No definite lung lesion can be identified in the visible lung fields.
- No abnormal soft tissue lesion.
- The bony structures are unremarkable.` },

{ id:"mri-brain-cwc", name:"Brain MRI with and without IV contrast",
  desc:"brain MRI with and without IV gadolinium contrast. DWI/ADC, MRA.",
  base:`Brain MRI with and without IV contrast enhancement shows:

[Pulse sequences]
(1) Axial turbo spin echo (TSE) T1WI, Sag T1WI
(2) 3D TOF MR angiography (MRA)
(3) Gadolinium enhanced axial, cor, sag T1WIs, axial T2WIs and FLAIR T2WIs.
(4) Diffusion weighted imaging (DWI) with apparent diffusion coefficiency (ADC) map
(5) [3D SWI with phase images or axial gradient T2* weighted images]

[Comparison with previous image] No

[Image findings]
- Mild ventricular dilatation, widening of cortical sulci & both Sylvian fissures are noted, in favor of mild atrophic change of brain parenchyma.
- High-signal foci on T2WIs are noted in the periventricular white matter of bilateral cerebral hemispheres, in favor of small vessel arteriosclerotic brain change.

- No definite space-occupying lesion nor abnormal enhancement.
- No diffusion restriction lesion is identified in the DWI/ADC map.
- No evidence of intracranial hemorrhage or midline shift is noted.
- The cranial vault and skull base appear normal.
- Clear paranasal sinuses and bilateral mastoid air cells.
- Preserved retrobulbar fat planes and nasopharynx.
- Bilateral major intracranial arteries, bilateral proximal ICA, VA are patent on MRA images.` },

{ id:"ct-cap-cwc", name:"CT chest/abdomen/pelvis without/with IV contrast",
  desc:"CT of chest abdomen pelvis (CAP) without/with IV contrast.",
  base:`CT scan of the chest, abdomen and pelvis without/with IV contrast enhancement shows:
[Comparison with previous image] No
[Findings]
- No definite lung lesion is identified.
- The heart size is within normal limit.
- No lymphadenopathy in the mediastinum nor bilateral hila.

- No abnormal hypodense lesion or enhancement of the liver parenchyma is identified.
- The gallbladder, pancreas, spleen, bilateral adrenal glands and kidneys are unremarkable.
- No definite abnormality of the bowel loops is appreciated.
- The appendix reveals normal in size.
- No definite lymphadenopathy can be identified in abdomen.
- The bony structures are unremarkable.` }
];

function buildSystemPrompt(){
  const catalog = TEMPLATES.map((t,i)=>
    `### Template ${i+1} — id:"${t.id}" — ${t.name}\n(${t.desc})\n"""\n${t.base}\n"""`
  ).join("\n\n");
  return `You are a radiology report assistant for a non-native English speaker. The dictation may be mis-transcribed; map approximate words to the correct standard radiology term (e.g. hemorrhage, infarct, lymphadenopathy, effusion).

Workflow:
1. Pick the ONE template below that best matches the dictated study (modality + body region + contrast). If contrast is unstated, prefer the "without contrast" variant; pick the "with"/"with/without" variant only when contrast/enhanced is mentioned.
2. Start from that template's base text EXACTLY.
3. The base text is an all-normal study. For each ABNORMAL finding the radiologist dictated:
   - If a matching normal/negative line exists, REWRITE that line into the positive finding using proper radiology phrasing.
   - Otherwise ADD a concise finding line in the correct section.
   - Leave every other normal line unchanged, in the original order.
4. If a comparison date/prior study is mentioned, fill the [Comparison with previous image] field; otherwise leave it as in the template.
5. Preserve the template's exact line structure, headings, spacing and bullet style.

Output a JSON object: {"templateId": "<id>", "report": "<the full final report text>"}. No extra commentary.

Templates:
${catalog}`;
}

/* ============================ 工具 ============================ */
const $=id=>document.getElementById(id);
const KEY_LS="vr_openai_key", MODE_LS="vr_mode";
const byId=id=>TEMPLATES.find(t=>t.id===id);
function setStatus(m,c){ const e=$("status"); e.textContent=m; e.className="status "+(c||""); }
function setKeyStatus(m,c){ const e=$("keyStatus"); e.textContent=m; e.className="status "+(c||""); }
function getKey(){ return ($("apiKey").value || localStorage.getItem(KEY_LS) || "").trim(); }
function showMatched(id){ const t=byId(id); $("matched").innerHTML=t?`<span class="pill">模板：${t.name}</span>`:""; }

/* ── 本地關鍵字選模板(免費模式,規則式) ── */
function matchTemplate(text){
  const s=" "+text.toLowerCase()+" ";
  const has=(...ks)=>ks.some(k=>s.includes(k));
  const mri    = has("mri","mr i"," mr ","magnetic","gadolinium");
  const brain  = has("brain","head","cerebr","intracranial","skull");
  const chest  = has("chest","lung","thorax","pleura","mediastin");
  const abd    = has("abdomen","abdominal","belly","liver","hepatic");
  const pelvis = has("pelvis","pelvic");
  const withc  = has("with contrast","with iv","contrast enhanc","enhanced","with and without","with/without","c plus","c+");
  const woc    = has("without contrast","noncontrast","non contrast","non-contrast","plain","w/o contrast","no contrast");
  const contrast = withc || (has("contrast") && !woc);
  if(mri && brain) return byId("mri-brain-cwc");
  if((chest&&abd) || has("cap","chest abdomen","whole body") || (chest&&pelvis)) return byId("ct-cap-cwc");
  if(brain) return byId("ct-brain-nc");
  if(chest) return contrast?byId("ct-chest-cwc"):byId("ct-chest-nc");
  if(abd)   return byId("ct-abdomen-cwc");
  return null;
}

/* ============================ 模式 ============================ */
let mode = localStorage.getItem(MODE_LS) || "free";
function applyMode(){
  [...$("modeSeg").children].forEach(b=>b.classList.toggle("on", b.dataset.mode===mode));
  if(mode==="free"){
    $("goBtn").textContent="🔍 選模板（免費）";
    setStatus("免費模式：本地關鍵字選模板，顯示原文（不需 key）");
  }else{
    $("goBtn").textContent="🧠 產生報告（自動填寫）";
    if(!getKey()){ setStatus("智慧模式需先到 ⚙️ 填 API key","err"); $("cfgCard").open=true; }
    else setStatus("智慧模式：gpt-4o-mini 選模板 + 翻陽性填寫");
  }
}
$("modeSeg").addEventListener("click",e=>{
  const b=e.target.closest("button[data-mode]"); if(!b) return;
  mode=b.dataset.mode; localStorage.setItem(MODE_LS,mode); applyMode();
});

/* ── API key ── */
$("apiKey").value = localStorage.getItem(KEY_LS) || "";
$("saveKey").onclick=()=>{ localStorage.setItem(KEY_LS,$("apiKey").value.trim()); setKeyStatus("已儲存 ✓","ok"); applyMode(); };

/* ============================ 產生報告 ============================ */
$("goBtn").onclick=async()=>{
  const t=$("dictation").value.trim();
  if(!t){ setStatus("請先在①口述（或打字）","err"); $("dictation").focus(); return; }
  $("matched").innerHTML="";
  if(mode==="free"){
    const tpl=matchTemplate(t);
    if(tpl){ $("result").value=tpl.base; showMatched(tpl.id);
      setStatus("完成 ✓ 免費模式只顯示模板原文；要自動翻陽性請用『智慧』","ok"); }
    else setStatus("找不到對應模板：「"+t+"」（試著講清楚 CT/MRI + 部位 + contrast）","err");
    return;
  }
  // 智慧模式
  if(!getKey()){ setStatus("請先填 API key","err"); $("cfgCard").open=true; return; }
  try{
    setStatus("產生中（gpt-4o-mini）…");
    const {templateId,report}=await fillTemplate(t);
    $("result").value=report; showMatched(templateId); setStatus("完成 ✓","ok");
  }catch(e){ setStatus("錯誤："+e.message,"err"); }
};

async function fillTemplate(transcript){
  const r=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",headers:{Authorization:"Bearer "+getKey(),"Content-Type":"application/json"},
    body:JSON.stringify({model:"gpt-4o-mini",temperature:0.2,response_format:{type:"json_object"},
      messages:[{role:"system",content:buildSystemPrompt()},{role:"user",content:"Dictation: "+transcript}]})});
  if(!r.ok) throw new Error("Chat "+r.status+" "+(await r.text()).slice(0,140));
  const txt=(await r.json()).choices[0].message.content;
  let o; try{ o=JSON.parse(txt); }catch(_){ o={templateId:"",report:txt}; } return o;
}

/* 複製 / 清空 */
$("copyBtn").onclick=async()=>{ const v=$("result").value;
  try{ await navigator.clipboard.writeText(v); setStatus("已複製 ✓","ok"); }
  catch(_){ $("result").select(); document.execCommand("copy"); setStatus("已複製 ✓","ok"); } };
$("clearBtn").onclick=()=>{ $("dictation").value=""; $("result").value=""; $("matched").innerHTML=""; applyMode(); };

applyMode();
</script>
</body>
</html>
